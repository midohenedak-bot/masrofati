<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>مصروفاتي</title>
<meta name="theme-color" content="#0a0b12" id="themeColorMeta">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="مصروفاتي">
<link rel="manifest" id="manifestLink">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0b12;--bg2:#0f1120;--surf:#13152a;--surf2:#1a1d35;--surf3:#222644;
  --brd:#2a2e52;--brd2:#363b6a;--txt:#e8ecff;--txt2:#b8bde8;--mut:#5c6490;
  --ac:#6c63ff;--ac2:#8b7fff;--ac-bg:rgba(108,99,255,.15);
  --grn:#00d49a;--grn-bg:rgba(0,212,154,.12);
  --red:#ff4d6d;--red-bg:rgba(255,77,109,.12);
  --gld:#ffb830;--gld-bg:rgba(255,184,48,.12);
  --shd:0 4px 24px rgba(0,0,0,.5);--shd2:0 12px 48px rgba(0,0,0,.7);
  --glow:0 0 32px rgba(108,99,255,.2);
  --grad:linear-gradient(135deg,#6c63ff,#b06aff);
  --r:20px;--rs:14px;--rx:9px;
}
[data-theme="blue"]{--ac:#3b82f6;--ac2:#60a5fa;--ac-bg:rgba(59,130,246,.15);--glow:0 0 32px rgba(59,130,246,.2);--grad:linear-gradient(135deg,#3b82f6,#06b6d4)}
[data-theme="green"]{--ac:#10b981;--ac2:#34d399;--ac-bg:rgba(16,185,129,.15);--glow:0 0 32px rgba(16,185,129,.2);--grad:linear-gradient(135deg,#10b981,#06b6d4)}
[data-theme="gold"]{--ac:#f59e0b;--ac2:#fbbf24;--ac-bg:rgba(245,158,11,.15);--glow:0 0 32px rgba(245,158,11,.2);--grad:linear-gradient(135deg,#f59e0b,#ef4444)}
[data-theme="rose"]{--ac:#f43f5e;--ac2:#fb7185;--ac-bg:rgba(244,63,94,.15);--glow:0 0 32px rgba(244,63,94,.2);--grad:linear-gradient(135deg,#f43f5e,#a855f7)}
[data-theme="cyan"]{--ac:#06b6d4;--ac2:#22d3ee;--ac-bg:rgba(6,182,212,.15);--glow:0 0 32px rgba(6,182,212,.2);--grad:linear-gradient(135deg,#06b6d4,#3b82f6)}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;background-image:radial-gradient(ellipse at 80% 0%,rgba(108,99,255,.07) 0%,transparent 55%),radial-gradient(ellipse at 20% 100%,rgba(0,212,154,.04) 0%,transparent 50%)}
.hdr{padding:calc(14px + env(safe-area-inset-top)) 18px 60px;position:relative;overflow:hidden;border-bottom:1px solid var(--brd)}
.orb{position:absolute;border-radius:50%;pointer-events:none}
.orb1{width:240px;height:240px;top:-80px;right:-60px;background:radial-gradient(circle,rgba(108,99,255,.18),transparent 65%)}
.orb2{width:160px;height:160px;bottom:-50px;left:-30px;background:radial-gradient(circle,rgba(0,212,154,.1),transparent 65%)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;position:relative;z-index:1}
.logo{display:flex;align-items:center;gap:10px}
.logo-ico{width:38px;height:38px;border-radius:12px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:var(--glow)}
.logo-name{font-size:1.1rem;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hbtns{display:flex;gap:7px}
.hbtn{background:rgba(255,255,255,.06);border:1px solid var(--brd);border-radius:10px;padding:7px 10px;cursor:pointer;font-size:.9rem;color:var(--txt2);transition:all .2s;line-height:1}
.hbtn:hover{border-color:var(--ac);color:var(--ac);background:var(--ac-bg)}
.date-pill{background:rgba(255,255,255,.05);border:1px solid var(--brd);color:var(--mut);padding:5px 11px;border-radius:20px;font-size:.68rem;font-weight:600}
.bal{position:relative;z-index:1;text-align:center}
.bal-lbl{color:var(--mut);font-size:.63rem;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:8px;font-weight:600}
.bal-row{display:flex;align-items:baseline;justify-content:center;gap:7px;margin-bottom:5px}
.bal-cur{font-size:.9rem;font-weight:600;color:var(--mut)}
.bal-num{font-size:2.8rem;font-weight:700;letter-spacing:-3px;line-height:1;transition:color .4s}
.bal-sub{font-size:.7rem;color:var(--mut);display:flex;align-items:center;justify-content:center;gap:5px}
.bal-dot{width:6px;height:6px;border-radius:50%;background:var(--grn)}
.main{padding:0 14px calc(88px + env(safe-area-inset-bottom));margin-top:-40px;position:relative;z-index:2;max-width:520px;margin-left:auto;margin-right:auto}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:14px 15px;animation:up .4s ease both;overflow:hidden;position:relative}
.stat-card::after{content:'';position:absolute;top:-20px;right:-20px;width:90px;height:90px;border-radius:50%;opacity:.05}
.stat-card.si::after{background:var(--grn)}.stat-card.se::after{background:var(--red)}
.stat-card:nth-child(2){animation-delay:.07s}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.st-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.st-ico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.st-ico.g{background:var(--grn-bg)}.st-ico.r{background:var(--red-bg)}
.st-tr{font-size:.63rem;padding:2px 7px;border-radius:8px;font-weight:700}
.st-tr.up{background:var(--grn-bg);color:var(--grn)}.st-tr.dn{background:var(--red-bg);color:var(--red)}.st-tr.na{background:var(--surf3);color:var(--mut)}
.st-lbl{font-size:.66rem;color:var(--mut);margin-bottom:3px}
.st-val{font-size:1.04rem;font-weight:700}.st-val.g{color:var(--grn)}.st-val.r{color:var(--red)}
.ring-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:13px 16px;display:flex;align-items:center;gap:14px;margin-bottom:12px;animation:up .4s .13s ease both}
.ring-info{flex:1}
.rrow{display:flex;justify-content:space-between;font-size:.74rem;margin-bottom:4px}
.rrow:last-child{margin:0;padding-top:6px;border-top:1px solid var(--brd)}
.rrow .rl{color:var(--mut)}.rrow .rv{font-weight:700}
.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.qbtn{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rs);padding:11px 4px 9px;cursor:pointer;text-align:center;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.6rem;color:var(--mut);font-weight:600;transition:all .2s}
.qbtn:hover{border-color:var(--ac);color:var(--ac);background:var(--ac-bg);transform:translateY(-2px)}
.qi{font-size:1.25rem;display:block;margin-bottom:5px}
.srch{margin-bottom:12px;position:relative}
.srch-ico{position:absolute;top:50%;transform:translateY(-50%);right:13px;color:var(--mut);font-size:.82rem;pointer-events:none}
.srch-in{width:100%;background:var(--surf);border:1px solid var(--brd);border-radius:var(--rs);padding:11px 36px 11px 13px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.84rem;color:var(--txt);outline:none;transition:border .2s,box-shadow .2s}
.srch-in:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac-bg)}
.srch-in::placeholder{color:var(--mut)}
.tabs{display:flex;background:var(--surf);border-radius:var(--rs);padding:3px;margin-bottom:12px;border:1px solid var(--brd);gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:8px 11px;border:none;border-radius:10px;background:none;cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.74rem;color:var(--mut);font-weight:500;transition:all .2s;white-space:nowrap}
.tab.active{background:var(--ac-bg);color:var(--ac);font-weight:700;border:1px solid var(--ac)}
.al-box{border-radius:var(--rx);padding:9px 12px;margin-bottom:8px;font-size:.77rem;font-weight:600;animation:up .3s;display:flex;align-items:center;gap:8px}
.al-box.w{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,77,109,.25)}
.al-box.i{background:var(--gld-bg);color:var(--gld);border:1px solid rgba(255,184,48,.25)}
.dnav{display:flex;align-items:center;justify-content:space-between;background:var(--surf);border-radius:var(--rs);padding:10px 13px;margin-bottom:12px;border:1px solid var(--brd)}
.dnbtn{background:var(--surf2);border:1px solid var(--brd);cursor:pointer;color:var(--mut);font-size:.9rem;padding:5px 10px;border-radius:8px;transition:all .15s;font-family:'IBM Plex Sans Arabic',sans-serif}
.dnbtn:hover{border-color:var(--ac);color:var(--ac)}
.dn-lbl{font-weight:600;font-size:.84rem}
.today-pip{background:var(--ac-bg);color:var(--ac);font-size:.6rem;padding:2px 7px;border-radius:8px;font-weight:700;margin-right:5px;border:1px solid var(--ac)}
.tc{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rs);padding:12px 13px;display:flex;align-items:center;gap:11px;margin-bottom:7px;animation:up .3s ease both;transition:transform .15s,border-color .15s}
.tc:hover{border-color:var(--brd2);transform:translateX(-2px)}
.t-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.t-body{flex:1;min-width:0}
.t-name{font-weight:600;font-size:.86rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-sub{font-size:.66rem;color:var(--mut)}
.t-right{text-align:left;flex-shrink:0}
.t-amt{font-weight:700;font-size:.87rem}.t-amt.income{color:var(--grn)}.t-amt.expense{color:var(--red)}
.t-acts{display:flex;gap:3px;margin-top:4px;justify-content:flex-end}
.ta{background:none;border:none;cursor:pointer;color:var(--brd2);font-size:.74rem;padding:3px 5px;border-radius:5px;transition:all .15s}
.ta.ed:hover{color:var(--ac);background:var(--ac-bg)}.ta.dl:hover{color:var(--red);background:var(--red-bg)}
.day-sum{background:linear-gradient(135deg,var(--surf),var(--surf2));border:1px solid var(--brd);border-radius:var(--rs);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.day-sum-l{font-size:.71rem;color:var(--mut);font-weight:600}.day-sum-v{font-weight:800;font-size:.9rem}
.empty{text-align:center;padding:40px 16px;color:var(--mut)}
.ei{font-size:2.4rem;display:block;margin-bottom:10px;opacity:.4}
.mc{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);padding:15px;margin-bottom:9px;animation:up .3s ease both}
.mc-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mc-n{font-weight:700;font-size:.87rem}
.net-pill{padding:3px 10px;border-radius:18px;font-size:.69rem;font-weight:700}
.bars{display:flex;flex-direction:column;gap:8px}
.br{display:flex;align-items:center;gap:8px}
.bl{font-size:.67rem;color:var(--mut);width:50px;flex-shrink:0}
.btr{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.34,1.56,.64,1)}
.bf.g{background:linear-gradient(90deg,#009e72,var(--grn))}.bf.r{background:linear-gradient(90deg,#cc3d57,var(--red))}
.bv{font-size:.69rem;font-weight:700;width:64px;text-align:left;flex-shrink:0}.bv.g{color:var(--grn)}.bv.r{color:var(--red)}
.bud-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rs);padding:13px;margin-bottom:8px;animation:up .3s ease both}
.bud-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.bud-n{font-weight:700;font-size:.84rem}.bud-a{font-size:.69rem;color:var(--mut)}
.bud-tr{width:100%;height:7px;background:var(--bg2);border-radius:4px;overflow:hidden;margin-bottom:5px}
.bud-f{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.34,1.56,.64,1)}
.bud-st{font-size:.67rem;font-weight:600}
.bud-ed{display:flex;gap:7px;margin-top:9px;align-items:center}
.bud-in{flex:1;background:var(--surf2);border:1px solid var(--brd);border-radius:8px;padding:7px 10px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.82rem;color:var(--txt);outline:none;transition:border .2s}
.bud-in:focus{border-color:var(--ac)}
.bud-sv{background:var(--ac);color:#fff;border:none;border-radius:8px;padding:7px 13px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.77rem;font-weight:700;cursor:pointer;white-space:nowrap}
.ch-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rs);padding:15px;margin-bottom:11px}
.ch-ttl{font-weight:700;font-size:.84rem;margin-bottom:11px}
.ch-leg{display:flex;gap:12px;margin-top:10px;font-size:.69rem;font-weight:600;flex-wrap:wrap}
.ldot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:4px}
.mchips{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;margin-bottom:11px;scrollbar-width:none}
.mchips::-webkit-scrollbar{display:none}
.mchip{flex-shrink:0;padding:5px 12px;border-radius:16px;border:1px solid var(--brd);background:var(--surf);cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.69rem;color:var(--mut);transition:all .15s;white-space:nowrap}
.mchip.active{border-color:var(--ac);background:var(--ac-bg);color:var(--ac);font-weight:700}
.cat-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--brd);font-size:.74rem}
.cat-item:last-child{border:none}
.cdot{width:9px;height:9px;border-radius:3px;flex-shrink:0}.cname{flex:1;font-weight:600}.cpct{color:var(--mut)}.cval{font-weight:700;color:var(--red);margin-right:4px}
.rec-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rs);padding:13px;margin-bottom:8px;display:flex;align-items:center;gap:11px;animation:up .3s ease both}
.rec-inf{flex:1}.rec-n{font-weight:700;font-size:.84rem;margin-bottom:2px}.rec-m{font-size:.66rem;color:var(--mut)}
.rec-acts{display:flex;gap:5px;flex-direction:column}
.btn-apl{background:var(--grn-bg);color:var(--grn);border:1px solid rgba(0,212,154,.3);border-radius:7px;padding:5px 10px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.67rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-apl:hover{background:var(--grn);color:#0a0b12}
.rform{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rs);padding:14px;margin-bottom:12px}
.rform-t{font-weight:700;font-size:.84rem;color:var(--ac);margin-bottom:11px}
.sc{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rs);padding:15px;margin-bottom:9px;animation:up .3s ease both}
.sc-t{font-weight:700;font-size:.86rem;margin-bottom:11px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--brd);font-size:.77rem}
.srow:last-child{border:none}.srow .sl{color:var(--mut)}.srow .sv{font-weight:700}
.ins-item{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--brd);font-size:.77rem;line-height:1.65}
.ins-item:last-child{border:none}.ins-i{font-size:.95rem;flex-shrink:0;margin-top:2px}
.dbadge{display:inline-block;padding:1px 7px;border-radius:8px;font-size:.6rem;font-weight:700;margin-right:3px}
.dbadge.up{background:var(--red-bg);color:var(--red)}.dbadge.dn{background:var(--grn-bg);color:var(--grn)}.dbadge.sm{background:var(--ac-bg);color:var(--ac)}
.ov{position:fixed;inset:0;background:rgba(5,6,15,.8);backdrop-filter:blur(10px);z-index:200;display:none;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.sht{background:var(--surf);border-radius:24px 24px 0 0;padding:20px 18px calc(30px + env(safe-area-inset-bottom));width:100%;max-width:520px;animation:shi .28s cubic-bezier(.34,1.56,.64,1);max-height:93vh;overflow-y:auto}
@keyframes shi{from{transform:translateY(100%)}to{transform:translateY(0)}}
.hdl{width:36px;height:4px;background:var(--brd2);border-radius:2px;margin:0 auto 17px}
.sht-t{font-size:.93rem;font-weight:700;margin-bottom:14px}
.type-sel{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.type-btn{padding:11px;border-radius:var(--rs);border:1px solid var(--brd);background:var(--surf2);cursor:pointer;text-align:center;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.81rem;font-weight:600;color:var(--mut);transition:all .2s}
.type-btn.active.expense{background:var(--red-bg);border-color:rgba(255,77,109,.35);color:var(--red)}
.type-btn.active.income{background:var(--grn-bg);border-color:rgba(0,212,154,.35);color:var(--grn)}
.cat-lbl{font-size:.68rem;color:var(--mut);margin-bottom:6px}
.cat-scr{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;margin-bottom:13px;scrollbar-width:none}
.cat-scr::-webkit-scrollbar{display:none}
.cat-chip{flex-shrink:0;padding:6px 11px;border-radius:18px;border:1px solid var(--brd);background:var(--surf2);cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.72rem;color:var(--mut);transition:all .15s;white-space:nowrap}
.cat-chip.sel{border-color:var(--ac);background:var(--ac-bg);color:var(--ac);font-weight:700}
.fld{margin-bottom:12px}.fld label{display:block;font-size:.69rem;color:var(--mut);margin-bottom:5px}
.fld input,.fld select{width:100%;background:var(--surf2);border:1px solid var(--brd);border-radius:var(--rs);padding:11px 13px;color:var(--txt);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.88rem;outline:none;transition:border .2s,box-shadow .2s}
.fld input:focus,.fld select:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac-bg)}
.fld input.amt{font-size:1.2rem;font-weight:700;letter-spacing:-.5px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-sub{width:100%;padding:14px;border:none;border-radius:var(--rs);background:var(--grad);color:#fff;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity .2s;box-shadow:var(--glow)}
.btn-sub:hover{opacity:.9}
.btn-can{width:100%;padding:12px;border:none;border-radius:var(--rs);background:var(--surf2);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.84rem;color:var(--mut);cursor:pointer;margin-top:4px}
.fab{position:fixed;bottom:calc(18px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:100;background:var(--grad);color:#fff;border:none;border-radius:26px;padding:13px 26px;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.87rem;font-weight:700;cursor:pointer;box-shadow:var(--glow),0 8px 28px rgba(0,0,0,.4);display:flex;align-items:center;gap:7px;transition:transform .2s}
.fab:hover{transform:translateX(-50%) translateY(-2px)}
.fab-p{font-size:1.2rem;line-height:1}
.notif{position:fixed;top:calc(14px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-120px);z-index:500;background:var(--surf3);border:1px solid var(--brd2);color:var(--txt);padding:10px 18px;border-radius:20px;font-size:.79rem;font-weight:700;box-shadow:var(--shd2);transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.notif.show{transform:translateX(-50%) translateY(0)}
.act-btn{width:100%;padding:12px 14px;border:1px solid var(--brd);border-radius:var(--rs);background:var(--surf2);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.84rem;font-weight:600;color:var(--txt);cursor:pointer;text-align:right;margin-bottom:7px;display:flex;align-items:center;gap:10px;transition:all .18s}
.act-btn:hover{border-color:var(--ac);background:var(--ac-bg);color:var(--ac)}
.act-ico{font-size:1.1rem}.act-sub{font-size:.65rem;color:var(--mut);font-weight:400;display:block;margin-top:1px}
.mex-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px;max-height:220px;overflow-y:auto}
.mex-btn{padding:9px 10px;border:1px solid var(--brd);border-radius:9px;background:var(--surf2);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:.74rem;font-weight:600;color:var(--txt);cursor:pointer;transition:all .15s}
.mex-btn:hover{border-color:var(--grn);background:var(--grn-bg);color:var(--grn)}
.th-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:14px}
